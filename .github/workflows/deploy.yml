name: deploy

on:
  push:
    branches: [main]

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: cd apps/frontend && pnpm install && pnpm run build
      - run: npx wrangler pages deploy dist --project-name=openrouter-free-models-frontend
